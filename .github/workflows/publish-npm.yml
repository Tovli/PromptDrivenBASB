name: Publish npm package

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Prepare publish version
        id: version
        run: npm run prepare:publish-version

      - name: Run tests
        run: npm test

      - name: Verify publish tarball
        run: npm run pack:check

      - name: Report skipped publish
        if: steps.version.outputs.should_publish != 'true'
        run: echo "Skipping npm publish because ${{ steps.version.outputs.publish_reason }}"

      - name: Publish package to npm
        id: publish
        if: steps.version.outputs.should_publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: |
          always() &&
          !cancelled() &&
          (
            steps.publish.outcome == 'success' ||
            (
              steps.version.outputs.should_publish == 'false' &&
              steps.version.outputs.publish_reason == 'gitHead already published'
            )
          )
        uses: actions/github-script@v8
        with:
          script: |
            const tag = `v${{ steps.version.outputs.publish_version }}`;

            try {
              const existingRelease = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`GitHub release ${tag} already exists as #${existingRelease.data.id}.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const createdRelease = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: tag,
              generate_release_notes: true,
            });

            core.info(`Created GitHub release ${tag} as #${createdRelease.data.id}.`);
